services:
  homepage:
    image: ghcr.io/gethomepage/homepage:latest
    container_name: homepage
    restart: unless-stopped

    user: "2001:3000"

    ports:
      - "3000:3000"

    environment:
      TZ: Europe/Berlin

    volumes:
      - /mnt/appdata/homepage/config:/app/config
      - /var/run/docker.sock:/var/run/docker.sock:ro

    security_opt:
      - no-new-privileges:true
