services:
  broker:
    image: redis:8
    container_name: paperless-redis
    restart: unless-stopped

    volumes:
      - /var/lib/docker/appdata/paperless/redis:/data

    labels:
      - "diun.enable=false"

  db:
    image: postgres:18
    container_name: paperless-db
    restart: unless-stopped

    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}

    volumes:
      - /var/lib/docker/appdata/paperless/db:/var/lib/postgresql/data

    labels:
      - "diun.enable=false"

  webserver:
    image: ghcr.io/paperless-ngx/paperless-ngx:latest
    container_name: paperless
    restart: unless-stopped
    depends_on:
      - db
      - broker

    ports:
      - "8010:8000"

    volumes:
      - /var/lib/docker/appdata/paperless/data:/usr/src/paperless/data
      - /var/lib/docker/appdata/paperless/media:/usr/src/paperless/media
      - /var/lib/docker/appdata/paperless/export:/usr/src/paperless/export
      - /var/lib/docker/appdata/paperless/consume:/usr/src/paperless/consume

    environment:
      PAPERLESS_REDIS: redis://broker:6379
      PAPERLESS_DBHOST: db

    env_file:
      - .env

    labels:
      - "diun.enable=true"
      - homepage.group=Documents
      - homepage.id=paperless
      - homepage.name=Paperless
      - homepage.icon=paperless
      - homepage.href=http://192.168.178.141:8010
      - homepage.description=Document Management
